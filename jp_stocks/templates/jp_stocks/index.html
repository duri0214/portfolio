{% extends "jp_stocks/base.html" %}
{% load static %}

{% block content %}
    <div class="container mt-4">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-4 border-bottom pb-2">
            <ol class="breadcrumb mb-0 small">
                <li class="breadcrumb-item active" aria-current="page">JP Stocks</li>
            </ol>
        </nav>

        <div class="row g-4">
            <!-- Hero -->
            <div class="col-12">
                <div class="bg-light p-5 rounded shadow-sm">
                    <h1 class="display-4">Hello, Japanese stocks!</h1>
                    <p class="lead">日本株の板シミュレーションを体験できます。</p>
                    <hr class="my-4">
                    <div class="d-flex flex-wrap gap-2">
                        <a href="{% url 'jpn:create_order' %}" class="btn btn-outline-primary">注文を作成</a>
                        <a href="{% url 'jpn:order_book' %}" class="btn btn-outline-secondary">板情報を見る</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
